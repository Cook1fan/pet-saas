server:
  port: 8080

spring:
  application:
    name: pet-saas-backend
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_saas?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 7000
      database: 0
      timeout: 3000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.pet.saas.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: satoken
  timeout: 2592000
  is-concurrent: false
  is-share: false
  token-prefix:
    pc: pc_
    merchant: merchant_
    user: user_
    platform: platform_
  is-log: true
  type: redis

knife4j:
  enable: false

spring-ai-alibaba:
  api-key: ${AI_API_KEY:}
  chat:
    options:
      model: doubao-pro-32k

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}
    token: ${WX_MINIAPP_TOKEN:}
    aes-key: ${WX_MINIAPP_AES_KEY:}
    msg-data-format: JSON
  # 微信公众号配置
  mp:
    appid: ${WX_MP_APPID:}
    secret: ${WX_MP_SECRET:}
    token: ${WX_MP_TOKEN:}
    aes-key: ${WX_MP_AES_KEY:}
    msg-data-format: JSON
    callback-url: ${WX_MP_CALLBACK_URL:}
    register-success-template-id: ${WX_MP_REGISTER_TEMPLATE_ID:}

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    cdn-domain: ${ALIYUN_OSS_CDN_DOMAIN:}
    path-prefix: images
    max-size: 5242880
    allowed-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/webp
      - image/gif
    expire-time: 3600

logging:
  level:
    com.pet.saas: debug
